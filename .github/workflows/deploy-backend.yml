name: Deploy backend

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: staging
        type: choice
        options: [staging, prod]

concurrency:
  group: deploy-backend-${{ github.event.inputs.environment || 'staging' }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Build, push, helm upgrade
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'staging' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: 21 }

      - name: Gradle build
        working-directory: backend
        run: ./gradlew :app:bootJar --no-daemon

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/app/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/sns-backend:${{ github.sha }},ghcr.io/${{ github.repository_owner }}/sns-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - uses: azure/setup-kubectl@v4
      - uses: azure/setup-helm@v4
        with: { version: v3.15.0 }

      - name: Configure kubeconfig
        run: echo "${{ secrets.KUBECONFIG }}" > $HOME/.kube/config

      - name: Helm upgrade
        run: |
          helm upgrade --install sns infra/helm/sns \
            --namespace ${{ github.event.inputs.environment || 'staging' }} \
            --create-namespace \
            --set image.tag=${{ github.sha }} \
            --values infra/helm/sns/values.yaml \
            --wait --timeout=5m
