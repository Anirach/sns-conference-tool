services:
  postgres:
    image: postgis/postgis:15-3.4
    container_name: sns-postgres
    environment:
      POSTGRES_DB: conf
      POSTGRES_USER: conf
      POSTGRES_PASSWORD: conf
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U conf -d conf"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sns-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    container_name: sns-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: miniosecret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailhog:
    image: mailhog/mailhog
    container_name: sns-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"

  backend:
    # Optional — only builds when the backend/ Gradle project is present (Phase 1+).
    # Use `docker compose --profile backend up` to start.
    profiles: ["backend"]
    build:
      context: ../backend
      dockerfile: app/Dockerfile
    container_name: sns-backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailhog:
        condition: service_started
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/conf
      SPRING_DATASOURCE_USERNAME: conf
      SPRING_DATASOURCE_PASSWORD: conf
      SMTP_HOST: mailhog
      SMTP_PORT: "1025"
      VERIFICATION_DEV_MODE: "true"
      SERVER_PORT: "8080"
    ports:
      - "8080:8080"

volumes:
  pgdata: {}
  miniodata: {}
