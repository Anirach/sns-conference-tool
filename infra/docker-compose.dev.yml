services:
  postgres:
    image: postgis/postgis:15-3.4
    container_name: sns-postgres
    environment:
      POSTGRES_DB: conf
      POSTGRES_USER: conf
      POSTGRES_PASSWORD: conf
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U conf -d conf"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sns-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    container_name: sns-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: miniosecret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailhog:
    image: mailhog/mailhog
    container_name: sns-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"

  web:
    # Next.js dev server in a container — preserves HMR via the bind mount.
    # `docker compose --profile web up` to start; pair with `--profile backend` for the
    # whole stack on Docker Desktop with no host Node/pnpm needed.
    profiles: ["web"]
    build:
      context: ../web
      dockerfile: Dockerfile.dev
    container_name: sns-web
    environment:
      # When backend is also up, Next's rewrite proxies /api/* server-side.
      BACKEND_PROXY_TARGET: http://backend:8080
      NEXT_PUBLIC_MOCK_API: "0"
      NEXT_PUBLIC_API_BASE: /api
      WATCHPACK_POLLING: "true"  # bind-mount on macOS / Windows uses polling for HMR
    volumes:
      - ../web:/app
      - /app/node_modules     # keep image's node_modules; don't shadow with empty host dir
      - /app/.next            # ditto for the Next build cache
    ports:
      - "3000:3000"

  backend:
    # Optional — only builds when the backend/ Gradle project is present (Phase 1+).
    # Use `docker compose --profile backend up` to start.
    profiles: ["backend"]
    build:
      context: ../backend
      dockerfile: app/Dockerfile
    container_name: sns-backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailhog:
        condition: service_started
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/conf
      SPRING_DATASOURCE_USERNAME: conf
      SPRING_DATASOURCE_PASSWORD: conf
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: "6379"
      REDISSON_ADDRESS: redis://redis:6379
      SMTP_HOST: mailhog
      SMTP_PORT: "1025"
      VERIFICATION_DEV_MODE: "true"
      CHAT_RELAY: redis
      RATE_LIMIT_BACKEND: memory
      SERVER_PORT: "8080"
      # On a fresh `docker compose up` (volume empty), seed Postgres with the same demo
      # dataset the MSW mocks ship — 21 users, NeurIPS+ACL participations, interests with
      # extracted keywords, recomputed similarity matches, 18 chat messages. Login as
      # you@example.com / Demo!2026. Set to "false" to start with an empty DB.
      SNS_DEV_SEED_DEMO_DATA: "true"
      # Promotes you@example.com to SUPER_ADMIN at boot so the /admin console is reachable
      # without manual SQL. Idempotent. ProductionSecretsCheck refuses prod boots without it.
      SNS_ADMIN_EMAIL: "you@example.com"
    ports:
      - "8080:8080"

volumes:
  pgdata: {}
  miniodata: {}
