{{- if .Values.redis.inCluster }}
# In-cluster Redis with Sentinel for staging / dev. For prod, prefer a managed service
# (ElastiCache, Memorystore) and set redis.inCluster=false; then point sns.chat.relay /
# CacheConfig at the external endpoint via secretEnv.
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-redis-headless
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: sns-redis
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - { name: redis, port: 6379, targetPort: 6379 }
    - { name: sentinel, port: 26379, targetPort: 26379 }
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Release.Name }}-redis
spec:
  serviceName: {{ .Release.Name }}-redis-headless
  replicas: {{ .Values.redis.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: sns-redis
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sns-redis
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          args: ["redis-server", "--appendonly", "yes"]
          ports:
            - { name: redis, containerPort: 6379 }
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits: { cpu: 500m, memory: 512Mi }
          volumeMounts:
            - { name: data, mountPath: /data }
        - name: sentinel
          image: redis:7-alpine
          args: ["redis-sentinel", "/etc/redis/sentinel.conf"]
          ports:
            - { name: sentinel, containerPort: 26379 }
          volumeMounts:
            - { name: sentinel-cfg, mountPath: /etc/redis }
      volumes:
        - name: sentinel-cfg
          configMap:
            name: {{ .Release.Name }}-redis-sentinel
  volumeClaimTemplates:
    - metadata: { name: data }
      spec:
        accessModes: [ReadWriteOnce]
        resources: { requests: { storage: {{ .Values.redis.storageSize }} } }
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-redis-sentinel
data:
  sentinel.conf: |
    port 26379
    sentinel monitor mymaster {{ .Release.Name }}-redis-0.{{ .Release.Name }}-redis-headless 6379 2
    sentinel down-after-milliseconds mymaster 5000
    sentinel parallel-syncs mymaster 1
    sentinel failover-timeout mymaster 10000
{{- end }}
