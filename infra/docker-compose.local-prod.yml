services:
  postgres:
    image: postgres:17-alpine
    ports: []
  backend:
    depends_on:
      postgres:
        condition: service_started
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/conf
      SPRING_DATASOURCE_USERNAME: conf
      SPRING_DATASOURCE_PASSWORD: conf
      CHAT_RELAY: inproc
      RATE_LIMIT_BACKEND: memory
      SMTP_HOST: host.docker.internal
      SMTP_PORT: "1025"
      SERVER_PORT: "8080"
      SNS_DEV_SEED_DEMO_DATA: "true"
      SNS_ADMIN_EMAIL: you@example.com
      SNS_SECURITY_CORS_ALLOWED_ORIGINS: https://sns.anirach.com,http://localhost:3002
    ports:
      - "8081:8080"
