name: sns_mobile
description: SNS Conference Tool — WebView shell with bridge stubs (pass 1).
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  webview_flutter: ^4.7.0
  webview_flutter_android: ^3.16.0
  webview_flutter_wkwebview: ^3.13.0
  flutter_riverpod: ^2.5.1
  flutter_secure_storage: ^9.2.2
  permission_handler: ^11.3.1
  connectivity_plus: ^6.0.3
  geolocator: ^12.0.0
  mobile_scanner: ^5.1.1
  file_picker: ^8.0.6
  firebase_core: ^3.3.0
  firebase_messaging: ^15.0.0
  flutter_facebook_auth: ^7.0.0
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  path_provider: ^2.1.3
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
