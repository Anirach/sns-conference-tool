spring:
  application:
    name: sns-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/conf}
    username: ${SPRING_DATASOURCE_USERNAME:conf}
    password: ${SPRING_DATASOURCE_PASSWORD:conf}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate.jdbc.time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
  mail:
    host: ${SMTP_HOST:localhost}
    port: ${SMTP_PORT:1025}
    properties:
      mail.smtp.auth: false
      mail.smtp.starttls.enable: false
  servlet:
    multipart:
      # Hard caps so a malicious upload can't OOM the JVM via giant multipart bodies.
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: ${SERVER_PORT:8080}
  forward-headers-strategy: framework

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true

sns:
  jwt:
    issuer: sns-conf
    audience: ${JWT_AUDIENCE:sns-conf}
    access-token-ttl: PT15M
    refresh-token-ttl: P30D
    clock-skew: PT30S
    # PEM-encoded PKCS#8 private key and public key. Loaded from env in prod.
    # If unset, the app generates an ephemeral keypair at boot (dev only).
    private-key: ${JWT_PRIVATE_KEY:}
    public-key: ${JWT_PUBLIC_KEY:}
  verification:
    # In dev the TAN is always 123456 when mail.dev-mode=true.
    dev-mode: ${VERIFICATION_DEV_MODE:true}
    tan-ttl: PT15M
  mail:
    from: ${MAIL_FROM:no-reply@sns.local}
  rate-limit:
    register-per-ip-per-hour: 5
    login-per-ip-per-hour: 30
    login-per-email-per-hour: 10
    refresh-per-ip-per-hour: 60
    backend: ${RATE_LIMIT_BACKEND:memory}    # memory | redis
  chat:
    relay: ${CHAT_RELAY:redis}               # redis | inproc
  cache:
    vicinity-ttl-seconds: 10
  location:
    throttle-seconds: 30
    throttle-min-move-meters: 10
  security:
    cors:
      # CSV. Empty = same-origin only. Operator opts in via env.
      allowed-origins: ${SNS_SECURITY_CORS_ALLOWED_ORIGINS:}
  actuator:
    # When set, /actuator/prometheus is open to bearer holders carrying this token (constant-time
    # compared). Leave blank to keep the endpoint behind the JWT chain entirely.
    scrape-token: ${SNS_ACTUATOR_SCRAPE_TOKEN:}
  audit:
    retention-days: 180
    prune-cron: "0 30 3 * * *"
  dev:
    # When true, on boot DevSeedRunner inserts the 3 demo events the MSW mocks ship
    # (NeurIPS Bangkok, ACL Vienna, ICML Montreal expired). Idempotent.
    seed-events: ${SNS_DEV_SEED_EVENTS:true}
    # When true, on boot DemoDataSeeder also inserts the 21 demo users + profiles +
    # participations + interests + chats from web/lib/fixtures/, so flipping
    # NEXT_PUBLIC_MOCK_API=0 produces a populated UI. Default off — never enable in prod.
    # Demo login: you@example.com / Demo!2026.
    seed-demo-data: ${SNS_DEV_SEED_DEMO_DATA:false}
